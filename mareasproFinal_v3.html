<style>
:root {
  --ocean:#0a1628; --mid:#0d2240; --surface:#122d52;
  --teal:#29b8e8; --teal-dim:#1a82b0; --amber:#f0a500; --coral:#ff6b4a;
  --white:#e8f4f8; --muted:#6a8fa8; --card:rgba(18,45,82,0.75); --glass:rgba(41,184,232,0.07);
}
body.day-mode {
  --ocean:#ddeef8; --mid:#c8e0f0; --surface:#b0d0e8;
  --white:#0a1628; --muted:#2a5070; --card:rgba(255,255,255,0.85); --glass:rgba(41,184,232,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--ocean);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;transition:background .6s,color .6s;}
body::before{content:'';position:fixed;inset:0;background:linear-gradient(175deg,#040e1e 0%,#071628 25%,#0a1e3c 55%,#0c2244 80%,#0e2850 100%);z-index:0;pointer-events:none;transition:all .8s;}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='100%25' height='100%25' viewBox='0 0 1200 900'><path d='M0 220 Q300 195 600 215 Q900 235 1200 210' fill='none' stroke='%2329b8e8' stroke-width='0.6' opacity='0.08'/><path d='M0 310 Q300 288 600 306 Q900 324 1200 300' fill='none' stroke='%2329b8e8' stroke-width='0.6' opacity='0.07'/><path d='M0 400 Q300 380 600 396 Q900 412 1200 390' fill='none' stroke='%2329b8e8' stroke-width='0.5' opacity='0.06'/><path d='M0 488 Q300 470 600 484 Q900 498 1200 478' fill='none' stroke='%2329b8e8' stroke-width='0.5' opacity='0.055'/><path d='M0 574 Q300 558 600 570 Q900 582 1200 564' fill='none' stroke='%2329b8e8' stroke-width='0.5' opacity='0.05'/><path d='M0 658 Q300 644 600 654 Q900 664 1200 648' fill='none' stroke='%2329b8e8' stroke-width='0.4' opacity='0.045'/><path d='M0 738 Q300 726 600 734 Q900 742 1200 728' fill='none' stroke='%2329b8e8' stroke-width='0.4' opacity='0.04'/></svg>");background-size:cover;background-position:center;z-index:0;pointer-events:none;transition:all .8s;}
body.day-mode::before{background:linear-gradient(175deg,#b8d8f0 0%,#c5e2f8 35%,#ceeaff 65%,#d4eeff 100%);}
body.day-mode::after{background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='100%25' height='100%25' viewBox='0 0 1200 900'><path d='M0 220 Q300 195 600 215 Q900 235 1200 210' fill='none' stroke='%230060a0' stroke-width='0.7' opacity='0.1'/><path d='M0 310 Q300 288 600 306 Q900 324 1200 300' fill='none' stroke='%230060a0' stroke-width='0.6' opacity='0.09'/><path d='M0 400 Q300 380 600 396 Q900 412 1200 390' fill='none' stroke='%230060a0' stroke-width='0.6' opacity='0.08'/><path d='M0 488 Q300 470 600 484 Q900 498 1200 478' fill='none' stroke='%230060a0' stroke-width='0.5' opacity='0.07'/><path d='M0 574 Q300 558 600 570 Q900 582 1200 564' fill='none' stroke='%230060a0' stroke-width='0.5' opacity='0.065'/><path d='M0 658 Q300 644 600 654 Q900 664 1200 648' fill='none' stroke='%230060a0' stroke-width='0.4' opacity='0.06'/></svg>");background-size:cover;background-position:center;}
.app{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 20px 60px;}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:24px 0 18px;border-bottom:1px solid rgba(41,184,232,.15);flex-wrap:wrap;gap:12px;}
.logo-text{display:none;}
.logo-sub{font-size:.65rem;letter-spacing:4px;text-transform:uppercase;color:var(--muted);font-weight:500;}
.header-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.toggle-group{display:flex;background:var(--mid);border-radius:8px;overflow:hidden;border:1px solid rgba(41,184,232,.2);}
.toggle-btn{padding:6px 14px;background:rgba(6,20,40,0.85);border:none;color:#8ab0c8;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;letter-spacing:1px;transition:all .2s;}
.toggle-btn.active{background:var(--teal);color:#061428;}
body.day-mode .toggle-btn{background:rgba(255,255,255,0.88);color:#1a5080;}
body.day-mode .toggle-btn.active{background:var(--teal);color:#061428;}
.daynight-btn{padding:6px 12px;background:rgba(6,20,40,0.85);border:1px solid rgba(41,184,232,.3);border-radius:8px;cursor:pointer;font-size:.95rem;transition:all .2s;}
.daynight-btn:hover{border-color:var(--teal);}
body.day-mode .daynight-btn{background:rgba(255,255,255,0.88);border-color:rgba(0,120,180,.4);}

/* SPONSORS GRID */
.sponsors-section{margin:18px 0;}
.sponsors-title{font-size:.6rem;letter-spacing:4px;text-transform:uppercase;color:var(--teal);font-weight:700;text-align:center;margin-bottom:10px;}
.sponsors-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sponsor-cell{background:#0d2040;border:1px solid rgba(41,184,232,.15);border-radius:10px;padding:14px;display:flex;align-items:center;justify-content:center;min-height:72px;cursor:pointer;transition:all .3s;text-decoration:none;}
.sponsor-cell:hover{border-color:var(--teal);}
.sponsor-cell img{max-width:100%;max-height:44px;object-fit:contain;filter:brightness(.88);transition:all .3s;}
.sponsor-cell:hover img{filter:brightness(1);}
.sponsor-cell span{font-size:.6rem;color:rgba(41,184,232,.3);letter-spacing:2px;text-transform:uppercase;}
body.day-mode .sponsor-cell{background:rgba(255,255,255,.85);border-color:rgba(0,120,180,.2);}
/* fade transition for rotation */
.sponsor-cell.fade{opacity:0;transition:opacity .3s;}
.sponsor-cell.visible{opacity:1;transition:opacity .4s;}

/* COAST */
.coast-bar{display:flex;gap:10px;padding:18px 0 14px;align-items:center;flex-wrap:wrap;}
.coast-label{font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:500;}
.coast-btn{padding:8px 20px;border-radius:40px;border:1.5px solid rgba(41,184,232,.3);background:rgba(6,20,40,0.82);color:#8ab0c8;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;transition:all .25s;}
.coast-btn:hover{border-color:var(--teal);color:var(--teal);}
.coast-btn.active{background:var(--teal);border-color:var(--teal);color:#061428;}
body.day-mode .coast-btn{background:rgba(255,255,255,0.85);color:#1a5080;}
body.day-mode .coast-btn.active{background:var(--teal);color:#061428;}

/* LOCATIONS */
.location-bar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.loc-btn{padding:9px 18px;background:rgba(6,20,40,0.82);border:1px solid rgba(41,184,232,.2);border-radius:10px;color:#8ab0c8;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;transition:all .2s;}
.loc-btn:hover{border-color:var(--teal);color:var(--teal);}
.loc-btn.active{background:rgba(41,184,232,.18);border-color:var(--teal);color:var(--teal);}
body.day-mode .loc-btn{background:rgba(255,255,255,0.85);color:#1a5080;border-color:rgba(0,120,180,.25);}
body.day-mode .loc-btn.active{background:rgba(41,184,232,.2);border-color:var(--teal);color:#065050;}

/* CARD */
.card{background:var(--card);backdrop-filter:blur(12px);border:1px solid rgba(41,184,232,.12);border-radius:16px;padding:22px;margin-bottom:18px;}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:3px;color:var(--teal);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.card-title .dot{width:5px;height:5px;background:var(--teal);border-radius:50%;}

/* MAIN GRID */
.main-grid{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start;}
@media(max-width:780px){.main-grid{grid-template-columns:1fr;}}

/* TIDE HEADER */
.tide-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.loc-info .loc-name{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:2px;line-height:1;}
.coast-badge{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;padding:3px 9px;border-radius:20px;font-weight:600;margin-top:4px;display:inline-block;}
.badge-pacific{background:rgba(0,100,200,.2);color:#4db8ff;border:1px solid rgba(0,100,200,.3);}
.badge-atlantic{background:rgba(41,184,232,.15);color:#29b8e8;border:1px solid rgba(41,184,232,.3);}
.date-block{text-align:right;}
.date-weekday{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:3px;color:var(--teal);text-transform:uppercase;}
.date-number{font-family:'Bebas Neue',sans-serif;font-size:3.2rem;line-height:1;color:var(--white);}
.date-monthyear{font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}

/* DATE PICKER */
.date-picker-row{display:flex;gap:8px;align-items:center;margin-bottom:18px;}
input[type=date]{background:rgba(255,255,255,.06);border:1px solid rgba(41,184,232,.2);border-radius:8px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.78rem;padding:6px 10px;outline:none;cursor:pointer;}
.today-btn{padding:6px 12px;background:rgba(41,184,232,.12);border:1px solid var(--teal-dim);color:var(--teal);border-radius:8px;font-size:.72rem;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.today-btn:hover{background:rgba(41,184,232,.25);}

/* CURRENT HEIGHT */
.tide-now{display:flex;align-items:flex-end;gap:14px;margin-bottom:20px;flex-wrap:wrap;}
.tide-height{font-family:'Bebas Neue',sans-serif;font-size:4.5rem;line-height:1;background:linear-gradient(135deg,var(--teal),#5dd8ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.tide-unit{font-size:1.1rem;color:var(--muted);margin-bottom:12px;}
.tide-status{padding:5px 13px;border-radius:20px;font-size:.72rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
.tide-rising{background:rgba(41,184,232,.2);color:var(--teal);border:1px solid var(--teal-dim);}
.tide-falling{background:rgba(240,165,0,.15);color:var(--amber);border:1px solid rgba(240,165,0,.4);}

/* CHART */
.tide-chart{display:flex;align-items:flex-end;gap:5px;height:80px;margin:16px 0 6px;padding:0 2px;}
.tide-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end;}
.tide-bar{width:100%;border-radius:3px 3px 0 0;transition:height .5s ease;min-height:3px;}
.tide-bar.now{box-shadow:0 0 10px rgba(41,184,232,.6);}
.tide-bar-time{font-size:.55rem;color:var(--muted);font-family:'DM Mono',monospace;white-space:nowrap;}

/* SCHEDULE TABLE */
.hl-table{width:100%;border-collapse:collapse;margin-top:14px;}
.hl-table td{padding:9px 6px;font-size:.82rem;border-bottom:1px solid rgba(255,255,255,.05);}
.hl-table td:first-child{color:var(--muted);font-size:.72rem;letter-spacing:1px;text-transform:uppercase;}
.hl-table td:nth-child(2){font-family:'DM Mono',monospace;font-weight:500;}
.hl-table td:last-child{text-align:right;}
.badge-high{color:var(--teal);font-weight:700;font-size:.72rem;}
.badge-low{color:var(--amber);font-weight:700;font-size:.72rem;}
.source-note{font-size:.6rem;color:var(--muted);text-align:right;margin-top:10px;letter-spacing:1px;}

/* MOON/SOLUNAR */
/* WAVE CHART */
.tide-wave-wrap{position:relative;margin:12px 0 4px;}
.tide-wave-wrap svg{width:100%;display:block;}
.fish-pin{position:absolute;display:flex;flex-direction:column;align-items:center;transform:translateX(-50%);pointer-events:none;}
.fish-pin span{font-size:16px;animation:fishbob .9s ease-in-out infinite alternate;}
.fish-pin-line{width:1px;height:10px;background:rgba(41,184,232,.4);}
@keyframes fishbob{from{transform:translateY(0)}to{transform:translateY(-4px)}}
.wave-time-labels{display:flex;justify-content:space-between;padding:0 2px;margin-bottom:8px;}
.wave-time-label{font-size:8px;color:var(--muted);}

/* SOLUNAR REDESIGN */
.sol-moon-row{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.sol-moon-big{font-size:3.2rem;line-height:1;}
.sol-moon-info{}
.sol-moon-phase{font-size:1rem;font-weight:700;color:var(--white);}
.sol-moon-quality{font-size:.75rem;font-weight:600;margin-top:3px;}
.sol-quality-great{color:var(--teal);}
.sol-quality-good{color:var(--amber);}
.sol-fish-row{display:flex;gap:3px;margin-top:6px;}
.sol-windows{display:flex;flex-direction:column;gap:7px;}
.sol-win{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;}
.sol-win-major{background:rgba(41,184,232,.1);border:1px solid rgba(41,184,232,.2);}
.sol-win-minor{background:rgba(240,165,0,.08);border:1px solid rgba(240,165,0,.15);}
.sol-win-left{display:flex;align-items:center;gap:8px;}
.sol-win-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.sol-label-major{color:var(--teal);}
.sol-label-minor{color:var(--amber);}
.sol-win-time{font-size:13px;color:var(--white);font-weight:600;margin-top:2px;}
.sol-fish-icons{display:flex;gap:2px;align-items:center;}
.sol-fish-icons span{font-size:14px;}
.sol-fish-icons span.dim{opacity:.25;}

/* WEATHER SECTION */
.weather-section{margin-top:0;}
.weather-card{background:rgba(13,32,64,.8);border:1px solid rgba(41,184,232,.15);border-radius:12px;padding:14px;margin-bottom:10px;}
body.day-mode .weather-card{background:rgba(255,255,255,.88);border-color:rgba(0,120,180,.2);}
.wc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.wc-loc{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--white);}
body.day-mode .wc-loc{color:#0a2040;}
.wc-badge{font-size:9px;font-weight:700;padding:3px 10px;border-radius:20px;}
.wc-badge-ok{background:rgba(41,184,232,.2);color:#29b8e8;}
.wc-badge-warn{background:rgba(240,165,0,.2);color:#f0a500;}
.wc-badge-alert{background:rgba(255,80,60,.2);color:#ff6050;}
.wc-main{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.wc-icon{font-size:44px;line-height:1;}
.wc-temp{font-size:44px;font-weight:700;color:var(--white);line-height:1;}
body.day-mode .wc-temp{color:#0a2040;}
.wc-temp sup{font-size:16px;color:var(--muted);}
.wc-desc{font-size:12px;color:var(--teal);font-weight:600;margin-top:2px;}
.wc-minmax{display:flex;flex-direction:column;gap:2px;margin-left:auto;text-align:right;}
.wc-hi{font-size:12px;color:#ff7060;font-weight:600;}
.wc-lo{font-size:12px;color:#60a8f0;font-weight:600;}
.wc-divider{border:none;border-top:1px solid rgba(255,255,255,.07);margin:8px 0;}
body.day-mode .wc-divider{border-color:rgba(0,0,0,.08);}
.wc-wind{display:flex;align-items:center;gap:8px;}
.wc-wind-spd{font-size:20px;font-weight:700;color:var(--white);}
body.day-mode .wc-wind-spd{color:#0a2040;}
.wc-wind-unit{font-size:11px;color:var(--muted);}
.wc-wind-dir{background:rgba(41,184,232,.2);color:var(--teal);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.wc-bars{display:flex;align-items:flex-end;gap:3px;margin-left:auto;}
.wc-bar{width:5px;border-radius:3px;}
.wc-loading{text-align:center;padding:20px;color:var(--muted);font-size:.75rem;letter-spacing:2px;}

/* Keep old moon-row for compat */
.moon-row{display:none;}
.solunar-bars{display:block;}

/* LINKS SECTION */
.links-list{display:flex;flex-direction:column;gap:8px;max-height:520px;overflow-y:auto;}
.links-list::-webkit-scrollbar{width:3px;}
.links-list::-webkit-scrollbar-thumb{background:var(--surface);border-radius:2px;}
.link-item{display:flex;gap:12px;align-items:center;background:rgba(18,40,72,.85);border:1px solid rgba(41,184,232,.12);border-radius:10px;padding:12px 14px;text-decoration:none;transition:all .2s;animation:fadeIn .3s ease;}
.link-item:hover{border-color:var(--teal);background:rgba(22,50,88,.95);}
body.day-mode .link-item{background:rgba(255,255,255,.88);border-color:rgba(0,120,180,.15);}
body.day-mode .link-item:hover{border-color:var(--teal);background:rgba(240,252,255,.95);}
.link-img-wrap{width:64px;height:64px;flex-shrink:0;border-radius:8px;background:#0d1f3c;overflow:hidden;display:flex;align-items:center;justify-content:center;border:1px solid rgba(41,184,232,.15);padding:4px;}
body.day-mode .link-img-wrap{background:#1a2e44;}
.link-img{width:100%;height:100%;object-fit:contain;display:block;}
.link-img-placeholder{font-size:1.4rem;line-height:1;}
.link-info{flex:1;min-width:0;}
.link-tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px;border-radius:20px;margin-bottom:5px;}
.tag-news{background:rgba(240,165,0,.18);color:#f0a500;}
.tag-sponsor{background:rgba(41,184,232,.18);color:#29b8e8;}
.tag-fishing,.tag-pescaya{background:rgba(255,107,74,.18);color:#ff8060;}
.tag-boating{background:rgba(55,138,221,.18);color:#60a8f0;}
.tag-tfs,.tag-store{background:rgba(41,184,232,.18);color:#29b8e8;}
.tag-ff507,.tag-comunidad{background:rgba(127,119,221,.18);color:#a09aee;}
.tag-clima,.tag-weather{background:rgba(55,138,221,.18);color:#60a8f0;}

// ═══════════════════════════════════════════════
// TIDE RENDERING
// ═══════════════════════════════════════════════
function getTideData(locId, date){
  const data=ACP_DATA[locId];
  if(!data) return null;
  const m=date.getMonth()+1;
  const d=date.getDate();
  const dayData=data[m]&&data[m][d];
  if(!dayData) return null;
  return dayData.map(([hhmm,ht,type])=>({
    time: parseHHMM(hhmm, date),
    height: ht,
    type: type
  }));
}

function parseHHMM(hhmm, date){
  const s=String(hhmm).padStart(4,'0');
  const h=parseInt(s.slice(0,2));
  const m=parseInt(s.slice(2,4));
  const d=new Date(date);
  d.setHours(h,m,0,0);
  return d;
}

function getCurrentHeight(tides, now){
  if(!tides||tides.length<2) return {height:0,rising:true};
  let prev=tides[0], next=tides[tides.length-1];
  for(let i=0;i<tides.length-1;i++){
    if(now>=tides[i].time&&now<=tides[i+1].time){prev=tides[i];next=tides[i+1];break;}
  }
  const total=next.time-prev.time;
  const elapsed=now-prev.time;
  const frac=total>0?elapsed/total:0;
  // Cosine interpolation
  const cosInterp=(1-Math.cos(frac*Math.PI))/2;
  const height=prev.height+(next.height-prev.height)*cosInterp;
  return {height, rising:next.height>prev.height};
}

function renderTide(){
  const displayDate=selectedDate||new Date();
  const now=new Date();

  // Update date display
  const days=tr('days'); const months=tr('months');
  document.getElementById('date-weekday').textContent=days[displayDate.getDay()];
  document.getElementById('date-number').textContent=displayDate.getDate();
  document.getElementById('date-monthyear').textContent=months[displayDate.getMonth()]+' '+displayDate.getFullYear();

  const tides=getTideData(currentLoc,displayDate);
  if(!tides){
    document.getElementById('tide-content').innerHTML=
      `<div style="padding:30px;text-align:center;color:var(--muted);font-size:.8rem;">No data for this date.</div>`;
    return;
  }

  const {height,rising}=getCurrentHeight(tides,now);

  // Build 24-bar chart
  const bars=[];
  for(let i=0;i<24;i++){
    const t=new Date(displayDate);
    t.setHours(i,0,0,0);
    const {height:bh}=getCurrentHeight(tides,t);
    bars.push({hour:i,height:bh});
  }
  const allH=bars.map(b=>b.height);
  const maxH=Math.max(...allH);
  const minH=Math.min(...allH);
  const range=maxH-minH||1;
  const currentHour=now.getHours();

  const barsHTML=bars.map((b,i)=>{
    const pct=((b.height-minH)/range)*85+5;
    const isNow=i===currentHour&&!selectedDate;
    const grad=isNow?'linear-gradient(180deg,#5dd8ff,#29b8e8)':
      b.height>minH+(range*.6)?'linear-gradient(180deg,rgba(41,184,232,.65),rgba(41,184,232,.3))':
      'linear-gradient(180deg,rgba(0,100,200,.5),rgba(0,100,200,.2))';
    return `<div class="tide-bar-wrap">
      <div class="tide-bar${isNow?' now':''}" style="height:${pct}%;background:${grad};"></div>
      ${i%4===0?`<div class="tide-bar-time">${String(i).padStart(2,'0')}h</div>`:'<div class="tide-bar-time"> </div>'}
    </div>`;
  }).join('');

  // Schedule: next 4 events from now (or all events for selected date)
  let upcoming;
  if(selectedDate){
    upcoming=tides;
  } else {
    upcoming=tides.filter(t=>t.time>now).slice(0,4);
    if(upcoming.length<2){
      // Add next day data
      const tomorrow=new Date(now);
      tomorrow.setDate(tomorrow.getDate()+1);
      const tmTides=getTideData(currentLoc,tomorrow)||[];
      upcoming=[...upcoming,...tmTides].slice(0,4);
    }
  }

  const schedHTML=upcoming.map(t=>{
    const timeStr=t.time.toLocaleTimeString(lang==='es'?'es-PA':'en-US',{hour:'2-digit',minute:'2-digit'});
    const arrow=t.type==='H'?'<span style="color:#29b8e8;">▲</span>':'<span style="color:#f0a500;">▼</span>';
    const badge=t.type==='H'?'badge-high':'badge-low';
    const label=t.type==='H'?tr('high'):tr('low');
    return `<tr>
      <td>${arrow} ${tr('next')} ${label}</td>
      <td>${timeStr}</td>
      <td><span class="${badge}">${toDisplay(t.height)} ${unitLabel()} — ${label}</span></td>
    </tr>`;
  }).join('');

  const showCurrent = !selectedDate;

  // Build SVG wave curve
  const svgW=360, svgH=80;
  const pts=bars.map((b,i)=>{
    const x=(i/23)*svgW;
    const y=svgH-((b.height-minH)/range)*(svgH-8)-4;
    return{x,y,h:b.height};
  });
  // Smooth path using cubic bezier
  let wavePath=`M${pts[0].x},${pts[0].y}`;
  for(let i=0;i<pts.length-1;i++){
    const cx1=pts[i].x+(pts[i+1].x-pts[i].x)/3;
    const cx2=pts[i+1].x-(pts[i+1].x-pts[i].x)/3;
    wavePath+=` C${cx1},${pts[i].y} ${cx2},${pts[i+1].y} ${pts[i+1].x},${pts[i+1].y}`;
  }
  const fillPath=wavePath+` L${svgW},${svgH} L0,${svgH} Z`;

  // Find best fishing times — solunar major window overlapping high tide
  const solH=new Date().getHours();
  const majorStart=(solH+1)%24;
  const majorEnd=(majorStart+2)%24;
  // Find peaks (local maxima) that overlap with solunar window
  const fishPins=[];
  for(let i=1;i<pts.length-1;i++){
    if(pts[i].h>=pts[i-1].h&&pts[i].h>=pts[i+1].h&&pts[i].h>minH+(range*0.5)){
      const hr=bars[i].hour;
      const inWindow=(hr>=majorStart&&hr<=majorEnd)||
                     (hr>=(majorStart+12)%24&&hr<=(majorEnd+12)%24);
      fishPins.push({x:pts[i].x,y:pts[i].y,priority:inWindow?'high':'med'});
    }
  }
  // Keep max 2 fish pins
  const topPins=fishPins.slice(0,2);

  // Current time line
  const nowX=!selectedDate?(currentHour/23)*svgW:-1;

  // Fish HTML overlays
  const fishHTML=topPins.map(p=>`
    <div class="fish-pin" style="left:${(p.x/svgW*100).toFixed(1)}%;top:${(p.y-24).toFixed(0)}px;">
      <span>🐟</span>
      <div class="fish-pin-line"></div>
    </div>`).join('');

  document.getElementById('tide-content').innerHTML=`
    ${showCurrent?`
    <div class="tide-now">
      <div class="tide-height">${toDisplay(height)}</div>
      <div class="tide-unit">${unitLabel()}</div>
      <div class="tide-status ${rising?'tide-rising':'tide-falling'}">
        ${rising?'▲ '+tr('rising'):'▼ '+tr('falling')}
      </div>
    </div>`:''}
    <div class="tide-wave-wrap">
      <svg viewBox="0 0 ${svgW} ${svgH}" preserveAspectRatio="none" style="height:80px;">
        <defs>
          <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#29b8e8" stop-opacity="0.55"/>
            <stop offset="100%" stop-color="#29b8e8" stop-opacity="0.04"/>
          </linearGradient>
        </defs>
        <path d="${fillPath}" fill="url(#wg)"/>
        <path d="${wavePath}" fill="none" stroke="#29b8e8" stroke-width="2" stroke-linecap="round"/>
        ${nowX>0?`<line x1="${nowX}" y1="0" x2="${nowX}" y2="${svgH}" stroke="rgba(240,165,0,.6)" stroke-width="1" stroke-dasharray="3,3"/>
        <circle cx="${nowX}" cy="${pts[Math.round(currentHour/23*23)].y}" r="3" fill="#f0a500"/>`:''} 
      </svg>
      ${fishHTML}
    </div>
    <div class="wave-time-labels">
      <span class="wave-time-label">00h</span>
      <span class="wave-time-label">06h</span>
      <span class="wave-time-label">12h</span>
      <span class="wave-time-label">18h</span>
      <span class="wave-time-label">23h</span>
    </div>
    <table class="hl-table">${schedHTML}</table>
    <div class="source-note">${tr('source')}</div>
  `;
}

// MOON & SOLUNAR
// ═══════════════════════════════════════════════
function getMoonPhase(){
  const diff=(new Date()-new Date('2000-01-06'))/86400000;
  const cycle=diff%29.53;
  if(cycle<1.85) return{icon:'🌑',name:lang==='es'?'Luna Nueva':'New Moon',quality:'great'};
  if(cycle<7.38) return{icon:'🌒',name:lang==='es'?'Creciente':'Waxing Crescent',quality:'good'};
  if(cycle<9.22) return{icon:'🌓',name:lang==='es'?'Cuarto Creciente':'First Quarter',quality:'good'};
  if(cycle<14.76)return{icon:'🌔',name:lang==='es'?'Gibosa Creciente':'Waxing Gibbous',quality:'great'};
  if(cycle<16.61)return{icon:'🌕',name:lang==='es'?'Luna Llena':'Full Moon',quality:'great'};
  if(cycle<22.15)return{icon:'🌖',name:lang==='es'?'Gibosa Menguante':'Waning Gibbous',quality:'good'};
  if(cycle<23.99)return{icon:'🌗',name:lang==='es'?'Último Cuarto':'Last Quarter',quality:'good'};
  return{icon:'🌘',name:lang==='es'?'Menguante':'Waning Crescent',quality:'good'};
}

function renderSolunar(){
  const moon=getMoonPhase();
  const h=new Date().getHours();
  const m1s=(h+1)%24, m1e=(h+2)%24;
  const m2s=(h+13)%24, m2e=(h+14)%24;
  const mn1s=(h+7)%24, mn1e=Math.floor((h+7.75))%24;
  const mn2s=(h+19)%24, mn2e=Math.floor((h+19.75))%24;
  const fmt=h=>`${String(h).padStart(2,'0')}:00`;
  const fishCount=moon.quality==='great'?4:3;
  const fishes=Array.from({length:5},(_,i)=>
    `<span style="font-size:${i<fishCount?'18':'14'}px;opacity:${i<fishCount?1:.2};">🐟</span>`
  ).join('');
  const winHTML=(label,cls,lcls,s,e,count)=>`
    <div class="sol-win ${cls}">
      <div class="sol-win-left">
        <span style="font-size:15px;">🎣</span>
        <div>
          <div class="sol-win-label ${lcls}">${label}</div>
          <div class="sol-win-time">${fmt(s)} — ${fmt(e)}</div>
        </div>
      </div>
      <div class="sol-fish-icons">
        ${Array.from({length:3},(_,i)=>`<span class="${i<count?'':'dim'}">🐟</span>`).join('')}
      </div>
    </div>`;
  const major=tr('major-feeding');
  const minor=tr('minor-feeding');
  document.getElementById('moon-icon').textContent='';
  document.getElementById('moon-phase-name').textContent='';
  document.getElementById('moon-phase-sub').textContent='';
  document.getElementById('solunar-bars').innerHTML=`
    <div class="sol-moon-row">
      <div class="sol-moon-big">${moon.icon}</div>
      <div class="sol-moon-info">
        <div class="sol-moon-phase">${moon.name}</div>
        <div class="sol-moon-quality sol-quality-${moon.quality}">
          ${moon.quality==='great'?'⭐ '+tr('moon-great'):'● '+tr('moon-good')}
        </div>
        <div class="sol-fish-row">${fishes}</div>
      </div>
    </div>
    <div class="sol-windows">
      ${winHTML(major,'sol-win-major','sol-label-major',m1s,m1e,3)}
      ${winHTML(major,'sol-win-major','sol-label-major',m2s,m2e,3)}
    </div>`;
}

const WEATHER_LOCS = {

function windDir(deg){
  const dirs=['N','NE','E','SE','S','SO','O','NO'];
  return dirs[Math.round(deg/45)%8];
}
function weatherIcon(code){
  if(code<=1) return '☀️';
  if(code<=3) return '⛅';
  if(code<=48) return '🌫️';
  if(code<=67) return '🌧️';
  if(code<=77) return '🌨️';
  if(code<=82) return '🌦️';
  return '⛈️';
}
function weatherDesc(code, es){
  const d={0:['Clear','Despejado'],1:['Mainly clear','Mayormente despejado'],2:['Partly cloudy','Parcialmente nublado'],3:['Overcast','Nublado'],45:['Foggy','Neblina'],48:['Foggy','Neblina'],51:['Drizzle','Llovizna'],61:['Rain','Lluvia'],80:['Showers','Chubascos'],95:['Thunderstorm','Tormenta']};
  const k=Object.keys(d).reverse().find(k=>code>=parseInt(k))||0;
  return d[k][es?1:0];
}
function windBadge(spd){
  if(spd<15) return{cls:'wc-badge-ok',txt:lang==='es'?'● Favorable':'● Favorable'};
  if(spd<30) return{cls:'wc-badge-warn',txt:lang==='es'?'● Moderado':'● Moderate'};
  return{cls:'wc-badge-alert',txt:lang==='es'?'● Alerta':'● Alert'};
}
function windBars(spd){
  const lvl=Math.min(5,Math.ceil(spd/10));
  const col=spd<15?'#29b8e8':spd<30?'#f0a500':'#ff6050';
  return Array.from({length:5},(_,i)=>`<div class="wc-bar" style="height:${(i+1)*6}px;background:${i<lvl?col:'rgba(255,255,255,.1)'}"></div>`).join('');
}

const DEMO_LINKS = [
  {tag:'fishing',title:'Panama Offshore Fishing Report — March 2026',url:'#',source:'PescaPanama.com',image:''},
  {tag:'news',title:'ACP Updates: New Navigation Rules for Yachts 2026',url:'#',source:'Panama Canal Authority',image:''},
  {tag:'boating',title:'Best Anchorages in Las Perlas Archipelago',url:'#',source:'Cruising World',image:''},
  {tag:'sponsor',title:'Visit our sponsor — Fishing Gear Panama',url:'#',source:'Sponsored',image:''},
];

async function loadLinks(){
  if(SHEET_CSV_URL.includes('YOUR_SHEET_ID')){
    renderLinks(DEMO_LINKS);
    return;
  }
  // Try direct fetch first, fallback to CORS proxy
  const urls=[
    SHEET_CSV_URL,
    'https://corsproxy.io/?'+encodeURIComponent(SHEET_CSV_URL),
    'https://api.allorigins.win/raw?url='+encodeURIComponent(SHEET_CSV_URL)
  ];
  for(const url of urls){
    try{
      const res=await fetch(url);
      if(!res.ok) continue;
      const csv=await res.text();
      if(!csv||csv.length<10) continue;
      const rows=csv.trim().split('\n').slice(1);
      const links=rows.map(row=>{
        const cols=row.match(/(".*?"|[^,]+)(?=,|$)/g)||row.split(',');
        const clean=cols.map(c=>(c||'').trim().replace(/^"|"$/g,''));
        return{tag:(clean[0]||'news'),
               title:(clean[1]||''),
               url:(clean[2]||'#'),
               source:(clean[3]||''),
               image:(clean[4]||'')};
      }).filter(l=>l.title);
      if(links.length){
        renderLinks(links);
        return;
      }
    }catch(e){ continue; }
  }
  renderLinks(DEMO_LINKS);
}

function renderLinks(links){
  const list=document.getElementById('links-list');
  if(!links.length){
    list.innerHTML=`<div class="links-empty">${tr('no-links')}</div>`;
    return;
  }
  list.innerHTML=links.map(l=>{
    const tagEmoji={fishing:'🎣',news:'📰',boating:'⛵',sponsor:'⭐',pescaya:'🎣',tfs:'🛒',ff507:'🪰',clima:'🌤',weather:'🌤'}[l.tag]||'🔗';
    const imgHTML=l.image
      ? `<img class="link-img" src="${l.image}" alt="${l.title}" onerror="if(!this.dataset.retry){this.dataset.retry=1;this.src='https://corsproxy.io/?'+encodeURIComponent(this.src);}else{this.parentElement.innerHTML='<div class=\'link-img-placeholder\'>${tagEmoji}</div>';}">`
      : `<div class="link-img-placeholder">${tagEmoji}</div>`;
    const shortUrl=(l.source||l.url.replace(/^https?:\/\/(www\.)?/,'').split('/')[0]);
    return `<a href="${l.url}" target="_blank" rel="noopener" class="link-item">
      <div class="link-img-wrap">${imgHTML}</div>
      <div class="link-info">
        <span class="link-tag tag-${l.tag}">${l.tag.toUpperCase()}</span>
        <div class="link-title">${l.title}</div>
        <div class="link-source">${shortUrl}</div>
      </div>
      <span class="link-arrow">›</span>
    </a>`;
  }).join('');
}

// ═══════════════════════════════════════════════
// SPONSORS GRID — 2x2 with auto-rotation if >4
// ═══════════════════════════════════════════════
let gridOffset = 0;
let gridTimer = null;
const GRID_DELAY = 4000;
const GRID_SLOTS = 4;

function buildCarousel(){
  const grid = document.getElementById('sponsors-grid');
  if(!grid) return;
  renderGrid();
  if(SPONSORS.length > GRID_SLOTS) startGridRotation();
}

function renderGrid(){
  const grid = document.getElementById('sponsors-grid');
  if(!grid) return;
  const visible = [];
  for(let i=0;i<GRID_SLOTS;i++){
    visible.push(SPONSORS[(gridOffset+i) % SPONSORS.length]);
  }
  grid.innerHTML = visible.map(s => {
    const inner = s.image
      ? `<img src="${s.image}" alt="${s.name}" onerror="this.parentElement.innerHTML='<span>${s.name}</span>'">`
      : `<span>${s.name}</span>`;
    const tag    = s.url&&s.url!=='#'?`a href="${s.url}" target="_blank" rel="noopener"`:'div';
    const close  = s.url&&s.url!=='#'?'a':'div';
    return `<${tag} class="sponsor-cell visible" style="text-decoration:none;">${inner}</${close}>`;
  }).join('');
}

function rotateGrid(){
  const grid = document.getElementById('sponsors-grid');
  if(!grid) return;
  // fade out
  grid.querySelectorAll('.sponsor-cell').forEach(c=>{
    c.classList.remove('visible');
    c.classList.add('fade');
  });
  setTimeout(()=>{
    gridOffset = (gridOffset + GRID_SLOTS) % SPONSORS.length;
    renderGrid();
  }, 320);
}

function startGridRotation(){
  if(gridTimer) clearInterval(gridTimer);
  gridTimer = setInterval(rotateGrid, GRID_DELAY);
}
